appId: com.folio.app
productName: Folio
# Keep ASAR on (smaller, faster startup) but unpack native binaries so they load by a real
# filesystem path at runtime (you can't dlopen a .node / spawn ExifTool from inside an asar).
asar: true
directories:
  # build/ is gitignored (build output), so committed resources (entitlements, icons) live here.
  buildResources: resources
  output: release
# After assembly, ad-hoc sign the macOS bundle so the unsigned build still launches on Apple Silicon
# (identity:null below skips signing, which leaves the framework's seal broken). See the hook.
afterPack: scripts/afterPack.cjs
files:
  - '!src/**'
  - '!dist/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!tsconfig*.json'
  - '!electron-builder.yml'
asarUnpack:
  - '**/*.node'
  - '**/node_modules/sharp/**'
  - '**/node_modules/@img/**'
  - '**/node_modules/better-sqlite3/**'
  - '**/node_modules/exiftool-vendored/**'
  - '**/node_modules/exiftool-vendored.*/**'
# Native modules are already built against Electron's ABI by the postinstall electron-rebuild
# (better-sqlite3) and shipped as N-API prebuilds (sharp), so a second rebuild here is redundant
# and brittle under pnpm's symlinked store. Re-enable if a target needs a fresh per-arch rebuild.
npmRebuild: false
mac:
  category: public.app-category.photography
  icon: resources/icons/icon.icns
  target:
    - dmg
    - zip
  # Unsigned for now. identity:null skips Developer ID signing (electron-builder still ad-hoc signs
  # so the app launches on Apple Silicon). Add identity + notarize once certificates are available.
  identity: null
  hardenedRuntime: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
win:
  icon: resources/icons/icon.ico
  target:
    - nsis
  # Unsigned: no signtoolOptions. SmartScreen will warn until an Authenticode cert is wired in.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
  category: Graphics
